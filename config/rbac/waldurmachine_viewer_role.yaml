# This rule is not used by the project cluster-api-provider-waldur itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to infrastructure.cluster.waldur.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-api-provider-waldur
    app.kubernetes.io/managed-by: kustomize
  name: waldurmachine-viewer-role
rules:
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurmachines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurmachines/status
  verbs:
  - get
