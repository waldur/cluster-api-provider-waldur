apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- manager.yaml
secretGenerator:
- envs:
  - waldur-api-secret.env
  name: waldur-api-secret
  options:
    disableNameSuffixHash: true
configMapGenerator:
- envs:
  - waldur-controller-config.env
  name: waldur-controller-config
  options:
    disableNameSuffixHash: true
images:
- name: controller
  newName: ghcr.io/waldur/cluster-api-provider-waldur
  newTag: 0.1.0
labels:
- includeSelectors: true
  pairs:
    cluster.x-k8s.io/provider: infrastructure-waldur
