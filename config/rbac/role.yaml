---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - machines
  - machines/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurclusters/finalizers
  verbs:
  - update
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurclusters/status
  verbs:
  - get
  - patch
  - update
