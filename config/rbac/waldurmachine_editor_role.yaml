# This rule is not used by the project cluster-api-provider-waldur itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the infrastructure.cluster.waldur.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-api-provider-waldur
    app.kubernetes.io/managed-by: kustomize
  name: waldurmachine-editor-role
rules:
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurmachines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.waldur.com
  resources:
  - waldurmachines/status
  verbs:
  - get
