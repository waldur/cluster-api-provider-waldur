---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: cluster-api-provider-waldur
    cluster.x-k8s.io/provider: infrastructure-waldur
    control-plane: controller-manager
  name: cluster-api-provider-waldur-controller-manager
  namespace: cluster-api-provider-waldur-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-api-provider-waldur
      cluster.x-k8s.io/provider: infrastructure-waldur
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: cluster-api-provider-waldur
        cluster.x-k8s.io/provider: infrastructure-waldur
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: WALDUR_API_URL
          valueFrom:
            secretKeyRef:
              key: URL
              name: cluster-api-provider-waldur-waldur-api-secret
              optional: true
        - name: WALDUR_API_TOKEN
          valueFrom:
            secretKeyRef:
              key: TOKEN
              name: cluster-api-provider-waldur-waldur-api-secret
              optional: true
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: VAULT_ADDR
          valueFrom:
            configMapKeyRef:
              key: VAULT_ADDR
              name: cluster-api-provider-waldur-waldur-controller-config
              optional: true
        - name: VAULT_K8S_ROLE
          valueFrom:
            configMapKeyRef:
              key: VAULT_K8S_ROLE
              name: cluster-api-provider-waldur-waldur-controller-config
              optional: true
        - name: BASE_TEMPLATE_CONFIGMAP
          valueFrom:
            configMapKeyRef:
              key: BASE_TEMPLATE_CONFIGMAP
              name: cluster-api-provider-waldur-waldur-controller-config
              optional: true
        image: ghcr.io/waldur/cluster-api-provider-waldur:v0.1.0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: cluster-api-provider-waldur-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
