spec:
  group: infrastructure.cluster.waldur.com
  names:
    kind: WaldurCluster
    listKind: WaldurClusterList
    plural: waldurclusters
    singular: waldurcluster
  scope: Namespaced
  versions:
  - name: v1beta2
    schema:
      openAPIV3Schema:
        description: WaldurCluster is the Schema for the waldurclusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of WaldurCluster
            properties:
              datacenters:
                description: |-
                  Datacenters defines per-datacenter configuration. Each entry maps to one
                  Waldur offering (OpenStack deployment). Single topology requires exactly 1;
                  multi topology requires exactly 3.
                items:
                  description: DatacenterSpec defines the configuration for a single
                    datacenter (Waldur offering).
                  properties:
                    name:
                      description: Name is a human-readable label for this datacenter,
                        used as the Waldur project name.
                      type: string
                    nodeGroups:
                      description: NodeGroups defines the groups of nodes to provision
                        in this datacenter.
                      items:
                        description: NodeGroupSpec defines a homogeneous group of
                          nodes within a datacenter.
                        properties:
                          count:
                            description: Count is the number of nodes to provision.
                            minimum: 1
                            type: integer
                          dataDiskSize:
                            description: |-
                              DataDiskSize is the size in GB of the data disk attached to each worker node.
                              Minimum 10 GB. Applicable to worker nodes.
                            minimum: 10
                            type: integer
                          flavor:
                            description: Flavor is the OpenStack flavor name for nodes
                              in this group.
                            type: string
                          type:
                            description: Type classifies the node group as worker
                              or storage.
                            enum:
                            - worker
                            - storage
                            type: string
                          vsanDiskSize:
                            description: |-
                              VsanDiskSize is the size in GB of the vSAN disk attached to each storage node.
                              Minimum 100 GB. Required for storage nodes (Longhorn).
                            minimum: 100
                            type: integer
                        required:
                        - count
                        - flavor
                        - type
                        type: object
                      minItems: 1
                      type: array
                    offeringSlug:
                      description: OfferingSlug is the Waldur marketplace offering
                        slug identifying this datacenter.
                      type: string
                    openstackInfrastructure:
                      description: OpenstackInfrastructure identifies the OpenStack
                        tenant backing this datacenter.
                      properties:
                        customerName:
                          description: CustomerName is the Waldur customer (organization)
                            slug that owns the tenant.
                          type: string
                        name:
                          description: Name is the name of the OpenStack tenant.
                          type: string
                        uuid:
                          description: |-
                            Uuid is the UUID of a pre-existing OpenStack tenant. When set, the controller
                            uses this tenant directly instead of creating a new one.
                          type: string
                      required:
                      - customerName
                      - name
                      type: object
                  required:
                  - name
                  - nodeGroups
                  - offeringSlug
                  - openstackInfrastructure
                  type: object
                minItems: 1
                type: array
              kubernetesVersion:
                description: KubernetesVersion is the target Kubernetes version in
                  semver format (e.g. v1.29.0).
                pattern: ^v\d+\.\d+\.\d+$
                type: string
              securityRules:
                description: SecurityRules defines CIDR-based network ingress/egress
                  policies applied to all tenants.
                items:
                  description: SecurityRule defines a CIDR-based network access policy.
                  properties:
                    cidr:
                      description: CIDR is the IPv4 address range in CIDR notation.
                      pattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
                      type: string
                    direction:
                      description: Direction specifies whether this rule applies to
                        incoming or outgoing traffic.
                      enum:
                      - ingress
                      - egress
                      type: string
                    port:
                      description: Port is the target port or port range (e.g. "443"
                        or "8000-9000").
                      type: string
                    protocol:
                      description: Protocol is the network protocol.
                      enum:
                      - tcp
                      - udp
                      - icmp
                      type: string
                  required:
                  - cidr
                  - direction
                  type: object
                type: array
              topology:
                description: |-
                  Topology defines whether resources are concentrated in a single datacenter
                  or distributed across three datacenters for high availability.
                enum:
                - single
                - multi
                type: string
            required:
            - datacenters
            - kubernetesVersion
            - topology
            type: object
          status:
            description: status defines the observed state of WaldurCluster
            properties:
              conditions:
                description: conditions represent the current state of the WaldurCluster
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              initialization:
                description: |-
                  Initialization provides information about infrastructure initialization.
                  Required by the CAPI v1beta2 contract — the core Cluster controller reads
                  status.initialization.provisioned to determine when to advance the cluster phase.
                properties:
                  provisioned:
                    description: Provisioned indicates the infrastructure has been
                      provisioned.
                    type: boolean
                type: object
              tenants:
                additionalProperties:
                  description: OpenStackTenant tracks the OpenStack tenant provisioned
                    for one offering.
                  properties:
                    marketplaceResourceState:
                      description: |-
                        MarketplaceResourceState is the lifecycle state of the marketplace resource
                        (e.g. Creating, OK, Erred, Terminating, Terminated).
                      type: string
                    marketplaceResourceUuid:
                      description: |-
                        MarketplaceResourceUuid is the UUID of the marketplace resource backing this tenant.
                        Required to submit a termination order.
                      type: string
                    name:
                      type: string
                    order:
                      description: Order is the currently executing or most recent
                        Waldur order for this tenant.
                      properties:
                        marketplaceResourceUuid:
                          type: string
                        resourceUuid:
                          type: string
                        state:
                          description: OrderState defines model for OrderState.
                          type: string
                        type:
                          description: RequestTypes defines model for RequestTypes.
                          type: string
                        uuid:
                          type: string
                      type: object
                    projectSlug:
                      description: ProjectSlug is the slug of the Waldur project created
                        for this datacenter.
                      type: string
                    state:
                      description: CoreStates defines model for CoreStates.
                      type: string
                    uuid:
                      type: string
                  type: object
                description: Tenants tracks the OpenStack tenant provisioned per offering
                  slug.
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
